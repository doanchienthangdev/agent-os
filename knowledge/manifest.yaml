# ${ORG_NAME} Works — Knowledge Manifest
#
# This file is the CONTRACT that tells every agent where each kind of company
# truth lives. Read it before searching, querying, or writing data.
#
# Four tiers:
#   T1 = Canonical (this git repo) — identity, strategy, SOPs, skills, agents
#   T2 = Operational (Postgres / Supabase ${SUPABASE_OPS_PROJECT_NAME}) — current state
#   T3 = Events & Artifacts (Supabase Storage / S3) — append-only, immutable
#   T4 = Derived (Vector DB + caches) — rebuildable from T1+T3
#
# Rules:
#   - Tier 1 is the only tier where humans negotiate meaning. PRs only.
#   - Tier 2/3 may be written by agents according to RACI in each SOP.
#   - Tier 4 is never authoritative. Rebuild scripts in `scripts/sync/`.
#   - DDL for every Tier 2 table lives in `supabase/migrations/`.
#     (`knowledge/schemas/` holds JSON Schemas validating registry YAML files,
#      NOT SQL — do not look for table DDL there.)
#   - Operating AI MUST NOT write to product.supabase. Read-only via ETL.

version: 0.2.0
last_updated: 2026-05-14
owner: founder

# ---------------------------------------------------------------------------
# TIER 1 — Canonical (this repo)
# ---------------------------------------------------------------------------
tier1_canonical:
  storage: git
  repo: ${GITHUB_OWNER}/${ORG_REPO_NAME}
  branch_protection: main  # PRs required; see governance/HITL.md
  pillars:
    charter:
      path: 00-charter/
      contents: [vision, mission, values, product, glossary, brand_voice]
      change_policy: pr_human_review
    growth:
      path: 01-growth/
      status: planned
    product_ops:
      path: 02-product/
      status: planned
      note: |
        This is operations AROUND the product (roadmap intake, release notes,
        feedback triage). The product codebase itself is in a separate repo.
    delivery:
      path: 03-delivery/
      status: planned
      note: B2C product ops at scale — support, onboarding, churn, in-app engagement.
    backoffice:
      path: 04-backoffice/
      status: planned
      note: Vietnam-specific tax & compliance context.
    ai_ops:
      path: 06-ai-ops/
      status: planned
    trust_safety:
      path: 06-trust-safety/
      status: planned
      note: |
        ${ORG_CATEGORY}-specific. Copyright/DMCA, hallucination guardrails, GDPR/PDPA,
        minor users (under 18), user-uploaded content moderation.
    skills:
      path: skills/
      status: planned
      note: SKILL.md files following Anthropic convention. Composable.
    agents:
      path: .claude/agents/
      status: planned
    workflows:
      path: workflows/
      status: planned
    governance:
      path: governance/
      status: planned
      contents: [ROLES.md, HITL.md, BUDGET.md, SECRETS.md]
    tool_plane:
      path: mcp/
      status: planned
      note: |
        MCP server configs (servers.yaml) and custom MCP servers. This is the
        ONLY way agents reach external systems. If a needed tool isn't here,
        it doesn't exist for the workforce yet.
    human_interface:
      path: interfaces/
      status: planned
      note: |
        Telegram bot, Slack app, CLI, and (future) web dashboard. The founder's
        primary entry points to delegate work to the AI workforce.

# ---------------------------------------------------------------------------
# WORKSPACE PLANE — transient material, not canonical truth
# ---------------------------------------------------------------------------
# These three folders support the work but are not authoritative. They have
# specific sync policies enforced by .gitignore. See each folder's README.
workspace_plane:
  raw:
    path: raw/
    sync_policy: local_only
    sync_mechanism: ".gitignore excludes raw/* except .gitkeep and README.md"
    purpose: |
      Source material before extraction — PDFs, recordings, screenshots,
      exports, voice notes. Each operator collects their own. Disposable.
    lifecycle: raw -> agent extracts -> wiki/ OR Tier 3 storage -> raw can be deleted
    rules:
      - Read raw, write extracted notes to wiki/
      - Cite raw paths in wiki notes (paths are private breadcrumbs)
      - Never reference raw/ paths from Tier 1 files

  wiki:
    path: wiki/
    sync_policy: opt_in_default_sync
    sync_mechanism: |
      All files synced by default. Files with underscore prefix
      (wiki/_foo.md, wiki/sub/_bar.md) are gitignored and stay local.
    purpose: |
      Extracted reference knowledge — notes about the world. Competitor
      analysis, market research, paper notes, customer interview synthesis.
      Informs decisions but does NOT drive agent behavior directly.
    promotion_path: |
      A wiki note never automatically affects agent behavior. To act on it:
      1. Read the wiki note
      2. Decide if it should change canonical truth
      3. Open a PR to the relevant Tier 1 file
      4. Cite the wiki note in PR description
    boundary:
      wiki: "notes about the world"
      tier1: "statements about who ${ORG_NAME} is and how ${ORG_NAME} operates"

  archives:
    path: .archives/
    sync_policy: shell_only
    sync_mechanism: |
      .gitignore excludes .archives/* but allows .gitkeep files and README.
      Subfolder structure committed; contents stay local.
    purpose: |
      Scratch space for agent reasoning — drafts, experiments, intermediate
      outputs, multi-step plans. Disposable, no obligation to clean.
    rules:
      - Default scratch location for agent work
      - Never reference .archives/ paths from canonical files
      - Promote (move), don't reference, when content is worth keeping

# Cross-folder summary — quick lookup for agents
where_things_go:
  external_source_material: raw/
  notes_about_external_things: wiki/
  agent_drafts_and_intermediate: .archives/
  who_org_is: 00-charter/
  how_org_operates: 0X-pillar/SOP-*/
  what_ai_can_do: skills/
  current_state: tier2_operational
  permanent_artifacts: tier3_events
  searchable_embeddings: tier4_derived

# ---------------------------------------------------------------------------
# TIER 2 — Operational (Supabase: ${SUPABASE_OPS_PROJECT_NAME} project)
# ---------------------------------------------------------------------------
# Source of truth for "what is happening right now" in the company.
# DDL lives in `supabase/migrations/` (apply via `supabase db push`).
# Agents query through the Supabase MCP server (configured per session).
#
# Each entry has:
#   - migration_file: source-of-truth DDL location in supabase/migrations/
#   - status: live (deployed) | planned (in PR) | deprecated
#   - bai_ref: link to design note in knowledge/phase-a2-extensions/ when applicable
tier2_operational:
  storage: supabase
  project_ref: ${SUPABASE_OPS_PROJECT_REF}   # ${SUPABASE_OPS_PROJECT_NAME} (${OPS_REGION_HUMAN})
  region: ${OPS_REGION}
  schemas:
    ops:
      description: Operating AI workspace — tasks, runs, decisions, knowledge graph, cost
      tables:
        # ====================================================================
        # Core agent + task tracking
        # ====================================================================
        - name: agent_runs
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          extended_by: supabase/migrations/00015_agent_runs_hitl_audit.sql
          status: live
          bai_ref: 5
          purpose: |
            Audit log — one row per agent invocation.
            Base columns (00002): id, started_at, ended_at, agent_slug,
              agent_version, triggered_by_kind/id, task_id, parent_run_id,
              state ('running'|'completed'|'failed'|'cancelled'), state_payload,
              input_payload, output_payload, llm_provider, llm_model,
              tokens_input, tokens_output, cost_usd, cost_bucket, error,
              error_at_step.
            HITL audit extension (00015, per governance/HITL.md):
              tier ('A'|'B'|'C'|'D-Std'|'D-MAX'), was_override (bool),
              override_reason, override_method, approved_by, approved_at,
              approval_message_url, cooldown_seconds, correcting_run_id,
              outcome ('success'|'failed'|'rejected'|'timeout'|'aborted'|'blocked'),
              secrets_accessed text[].
            Episodic recall extension (00015, per memory-architecture.md):
              recall_run_ids uuid[], recall_tokens_loaded.
            Hash extension (00015): input_payload_hash, output_payload_hash.
            Immutability: trg_agent_runs_override_immutable raises on UPDATE
              of rows with was_override = true.
        - name: tasks
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 5
          purpose: |
            Generic task queue (Bài #5). Used for both subagent + human work.
            Columns: id, created_at, task_type, input_payload, assignee_kind
              ('agent'|'human'|'minion'), assignee_id, state, state_since,
              state_payload, state_version, output_payload, error, priority,
              parent_task_id (self-FK), context_id (correlation ID).
            State machine (Bài #13 convention):
              pending → assigned → running → completed | failed | cancelled.
            NOTE: this state machine differs from the proposal in
              orchestration-architecture.md (which said
              pending→ready→in_progress→done/failed/blocked). DB is the source
              of truth; orchestration-architecture.md is being updated to match.
            HITL tier propagation: store as state_payload.hitl_tier rather than
              a dedicated column.
        - name: task_state_transitions
          migration_file: supabase/migrations/00018_orchestration_storage_growth.sql
          status: live
          purpose: |
            Append-only audit log for every state change on ops.tasks.
            Columns: id, task_id (FK CASCADE), from_state, to_state,
              by_run_id (FK agent_runs SET NULL), reason text, ts.
            Powers debugging and orchestration forensics
            (orchestration-architecture.md).
        - name: minion_jobs
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 5
          purpose: Deterministic work queue (GBrain Minions pattern). 100x cheaper than subagent for deterministic tasks.
        # ====================================================================
        # HITL + audit
        # ====================================================================
        - name: hitl_runs
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 2
          purpose: |
            Human-in-the-loop runs. Tier A=auto, B=batch, C=immediate,
            D=critical, E=halt (per governance/HITL.md).
        - name: audit_log
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 1
          purpose: Append-only compliance audit trail. NEVER UPDATE/DELETE rows.
        # ====================================================================
        # Memory architecture (Strategy E)
        # ====================================================================
        - name: run_summaries
          migration_file: supabase/migrations/00016_memory_architecture_tables.sql
          status: live
          purpose: |
            ~150-token post-hoc summary per completed agent_run (Type 2 memory
            in memory-architecture.md). Powers `episodic-recall` skill.
            Columns: run_id (PK, FK agent_runs CASCADE), agent_slug,
              action_name, summary, artifacts (jsonb), ts.
        - name: corrections
          migration_file: supabase/migrations/00016_memory_architecture_tables.sql
          status: live
          purpose: |
            Founder corrections to agent outputs. Powers learning loop.
            Columns: id, run_id (FK CASCADE), corrected_by, correction_kind
              ('reject'|'edit'|'redirect'|'reframe'), correction_note, ts.
        # ====================================================================
        # Economic architecture
        # ====================================================================
        - name: cost_attributions
          migration_file: supabase/migrations/00017_economic_architecture_tables.sql
          status: live
          purpose: |
            Per-LLM-call cost ledger (economic-architecture.md Axis 1).
            Populated by .claude/hooks/pre-llm-call-budget.md on every call.
            Reconciled daily against Anthropic Usage Admin API; >5% drift
            alerts founder.
        - name: budget_alerts
          migration_file: supabase/migrations/00017_economic_architecture_tables.sql
          status: live
          purpose: |
            Per-role per-month budget breach events plus weekly Economic
            Health Score history (Axes 2-3).
            alert_kind: 'warning_80'|'escalate_100'|'hard_block_150'|'health_score_low'.
        - name: optimization_recommendations
          migration_file: supabase/migrations/00017_economic_architecture_tables.sql
          status: live
          purpose: |
            Output of `cost-optimization-review` skill — weekly proposed
            changes to reduce cost (Axis 3). Founder approves/rejects via
            Telegram → PR.
        # ====================================================================
        # Visibility, events, alerts, KPIs
        # ====================================================================
        - name: events
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 11
          purpose: |
            Event outbox + dispatch tracking. Insert events here;
            event-dispatcher reads and fires SOPs per
            knowledge/event-subscriptions.yaml.
        - name: kpi_snapshots
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 10
          purpose: KPI time-series, append-only. Use materialized views for aggregations.
        - name: alerts
          migration_file: supabase/migrations/00002_ops_core_tables.sql
          status: live
          bai_ref: 10
          purpose: Alert lifecycle. Routes per knowledge/alert-rules.yaml.
        - name: attention_log
          migration_file: supabase/migrations/00007_decisions_ingestion_attention.sql
          status: live
          bai_ref: 19
          purpose: Founder capacity / attention tracking.
        # ====================================================================
        # Scheduling, SOPs, MCP
        # ====================================================================
        - name: scheduled_runs
          migration_file: supabase/migrations/00003_schedules_sops.sql
          status: live
          bai_ref: 8
          purpose: pg_cron firing log. Dispatcher claims rows here.
        - name: sop_runs
          migration_file: supabase/migrations/00003_schedules_sops.sql
          status: live
          bai_ref: 9
          purpose: SOP execution tracking — each row = 1 SOP run with full history.
        - name: mcp_calls
          migration_file: supabase/migrations/00004_visibility_mcp.sql
          status: live
          bai_ref: 12
          purpose: MCP tool execution log. Audit trail of every tool call.
        # ====================================================================
        # Decisions + ingestion
        # ====================================================================
        - name: decisions
          migration_file: supabase/migrations/00007_decisions_ingestion_attention.sql
          status: live
          bai_ref: 15
          purpose: Decision log (Decision Architecture).
        - name: ingestion_jobs
          migration_file: supabase/migrations/00007_decisions_ingestion_attention.sql
          status: live
          bai_ref: 18
          purpose: Knowledge ingestion pipeline jobs (per knowledge/ingestion-sources.yaml).
        # ====================================================================
        # Knowledge graph + embeddings (Tier 4 lives here, not separate vector store)
        # ====================================================================
        - name: knowledge_pages
          migration_file: supabase/migrations/00006_knowledge_graph.sql
          status: live
          bai_ref: 14
          purpose: Page metadata index. Files in wiki/ are source; this is the index.
        - name: knowledge_links
          migration_file: supabase/migrations/00006_knowledge_graph.sql
          status: live
          bai_ref: 14
          purpose: Graph edges between pages. Auto-extracted via regex.
        - name: knowledge_embeddings
          migration_file: supabase/migrations/00006_knowledge_graph.sql
          status: live
          bai_ref: 14
          purpose: |
            pgvector HNSW embeddings (Tier 4 implementation). This is THE
            vector store — manifest's tier4_derived references this table,
            not a separate provider.
        # ====================================================================
        # Capability lifecycle
        # ====================================================================
        - name: capability_runs
          migration_file: supabase/migrations/00011_capability_lifecycle.sql
          status: live
          bai_ref: 20
          purpose: Capability lifecycle tracking — multi-session resilient, can span weeks.
        - name: capability_phase_events
          migration_file: supabase/migrations/00011_capability_lifecycle.sql
          status: live
          bai_ref: 20
          purpose: Phase change events for capability_runs.
        - name: v_capability_pipeline
          migration_file: supabase/migrations/00011_capability_lifecycle.sql
          kind: view
          status: live
          purpose: Roll-up view of capability_runs phase progress.
        # ====================================================================
        # Tier 3 index + Growth
        # ====================================================================
        - name: tier3_index
          migration_file: supabase/migrations/00018_orchestration_storage_growth.sql
          status: live
          purpose: |
            One row per Tier 3 blob (Supabase Storage). Referenced by
            knowledge_embeddings.source_kind='tier3_blob' for source linkage.
        - name: campaigns
          migration_file: supabase/migrations/00018_orchestration_storage_growth.sql
          status: live
          purpose: Growth campaigns (01-growth pillar). FK target for future ops.content_drafts, ops.leads.
        # ====================================================================
        # Settings
        # ====================================================================
        - name: settings
          migration_file: supabase/migrations/00013_ops_settings.sql
          status: live
          purpose: Runtime settings store (key-value config readable by Edge Functions).
        # ====================================================================
        # Cross-Tier Consistency Engine (v1.0b)
        # ====================================================================
        - name: consistency_checks
          migration_file: supabase/migrations/00021_consistency_checks.sql
          status: live
          purpose: |
            Lifecycle log for the Cross-Tier Consistency Engine. One row per
            invariant evaluation (L1/L2/L3). States: pending → running →
            passed | failed | fix_proposed | fix_merged | fix_reverted |
            wont_fix. Owned by SOP-AIOPS-002. Powers founder dashboard +
            alerts + drift-weekly-retro (deferred).
    metrics:
      description: ETL'd snapshots of Product metrics (read-only mirror)
      tables:
        - name: product_dau_snapshot
          migration_file: supabase/migrations/00019_metrics_schema_product_mirror.sql
          status: live
          source: product.supabase via scheduled ETL
          refresh: hourly
          note: |
            Table exists as structural placeholder. ETL flow
            etl_flows.product_metrics_to_ops is still `planned` — no rows yet.
  public_schema:
    description: |
      Schema `public` holds customer-entity tables (00005_customer_entity.sql):
      customers, persons, companies, company_persons + materialized view
      mv_customer_360. These are Operating-AI-owned (CRM-style), distinct from
      Product user data which never appears here.
    tables: [customers, persons, companies, company_persons, mv_customer_360]
  isolation:
    cannot_write_to:
      - project: ${ORG_SLUG}  # the Product Supabase
        rationale: |
          Operating AI must not be able to harm paying users. Even read access
          to product.* should go through views in metrics.* populated by ETL,
          not direct queries. The ONLY role holding the product read key is
          `etl-runner` (governance/SECRETS.md).

# ---------------------------------------------------------------------------
# TIER 3 — Events & Artifacts (Supabase Storage / S3-compatible)
# ---------------------------------------------------------------------------
# Append-only. Immutable. Every item has a stable URI.
tier3_events:
  storage: supabase_storage
  buckets:
    - name: ops-transcripts
      purpose: Founder voice notes, calls, agent conversations exported.
      retention: indefinite
      naming: "yyyy/mm/dd/<source>-<id>.{json,txt,mp3}"
    - name: ops-artifacts
      purpose: Generated content drafts, screenshots, exported reports.
      retention: 365d
    - name: ops-agent-logs
      purpose: Full agent action logs (also indexed in tier 2 agent_runs).
      retention: 90d
  index_table: ops.tier3_index  # in Tier 2 — every blob has a row here

# ---------------------------------------------------------------------------
# TIER 4 — Derived (Vector DB + caches)
# ---------------------------------------------------------------------------
# Never authoritative. Always rebuildable.
# Implementation: pgvector inside the ${SUPABASE_OPS_PROJECT_NAME} Postgres
# (ops.knowledge_embeddings, HNSW index from migration 00006). NOT a separate
# external vector store.
tier4_derived:
  vector_store:
    provider: pgvector  # in-database, via ops.knowledge_embeddings
    physical_table: ops.knowledge_embeddings
    index_method: HNSW (vector_cosine_ops)
    migration_file: supabase/migrations/00006_knowledge_graph.sql
    namespaces:
      # Namespaces are logical partitions inside ops.knowledge_embeddings,
      # distinguished by source_kind + source_ref columns. Rebuild scripts
      # populate the same table with different source_kind values.
      - name: charter_embeddings
        source: tier1_canonical.charter
        source_kind: charter_page
        rebuild_script: scripts/sync/rebuild-charter-embeddings.sh
        status: planned
      - name: skills_embeddings
        source: 06-ai-ops/skills/
        source_kind: skill
        rebuild_script: scripts/sync/rebuild-skills-embeddings.sh
        status: planned
      - name: transcripts_embeddings
        source: tier3_events.buckets[ops-transcripts]
        source_kind: tier3_blob
        rebuild_script: scripts/sync/rebuild-transcripts-embeddings.sh
        status: planned
  cache_layer:
    provider: TBD  # candidates: Upstash Redis, Cloudflare KV
    purpose: Memoize expensive LLM calls and tool results.

# ---------------------------------------------------------------------------
# Cross-tier ETL flows
# ---------------------------------------------------------------------------
etl_flows:
  - name: product_metrics_to_ops
    direction: product_supabase -> ${SUPABASE_OPS_PROJECT_NAME_SNAKE}
    mode: read_only
    cadence: hourly
    implementation: supabase/functions/_shared/worker.ts (makeEtlProductDauSnapshotHandler)
    scheduled_via: knowledge/schedules.yaml (id=etl-product-dau-hourly)
    status: code_ready_secrets_pending
    rationale: |
      Operating AI needs DAU, MRR, churn to make growth/delivery decisions
      without ever touching the production database directly.
    activation_requires: |
      Founder must provision SUPABASE_PRODUCT_URL and
      SUPABASE_PRODUCT_READONLY_ETL_KEY into the minion-worker Edge Function
      env. This is a D-MAX action per governance/HITL.md (any access to
      Product Supabase). Until provisioned, the hourly fire returns
      `deferred_no_product_supabase_key` and writes nothing.
    product_contract:
      view: v_ops_dau_export
      owner: product team (separate repo)
      columns: |
        snapshot_at timestamptz, dau int, wau int, mau int,
        new_signups_24h int, paid_users int, free_users int,
        churned_users_24h int, extra jsonb
  - name: tier3_to_tier4_embeddings
    direction: storage -> vector_store
    cadence: nightly
    script: scripts/sync/embed-new-artifacts.sh
    status: planned

# ---------------------------------------------------------------------------
# Secrets & access — pointer to governance/SECRETS.md
# ---------------------------------------------------------------------------
# Secrets never live in this file or anywhere in the repo. This is the high-
# level map; the canonical role-to-secret matrix lives in governance/SECRETS.md
# and the values live in the chosen secret manager (TBD: 1Password Service
# Accounts recommended; see SECRETS.md).
secrets_map:
  policy_doc: governance/SECRETS.md
  manager:
    provider: TBD
    candidates:
      - 1password_service_accounts
      - doppler
      - supabase_vault  # for DB-internal only
  critical_boundaries:
    - boundary: product_database_isolation
      rule: |
        Only role 'etl-runner' holds SUPABASE_PRODUCT_READONLY_ETL_KEY.
        SUPABASE_PRODUCT_FULL_SERVICE_KEY does not exist in this repo's
        secret manager — it lives in the product repo. Operating AI cannot
        write to ${ORG_SLUG} (Product Supabase).
    - boundary: stripe_money_movement
      rule: |
        No agent role holds any Stripe key that can move money. Refunds and
        charges require founder action via Tier C/D ceremony per HITL.md.
    - boundary: github_force_actions
      rule: |
        No agent PAT has permission to merge, approve, or force-push. Only
        GITHUB_TOKEN_FOUNDER (founder-only) has those capabilities.

# ---------------------------------------------------------------------------
# How to add a new data source (checklist for agents and humans)
# ---------------------------------------------------------------------------
add_new_source_checklist:
  - decide_tier: Is this canonical, operational, event, or derived?
  - if_tier1: Add file under appropriate pillar; open PR.
  - if_tier2: Write migration in supabase/migrations/ (next sequence number); add entry under tier2_operational.schemas with migration_file pointer; open PR; apply with `supabase db push` after merge.
  - if_tier3: Add bucket entry under tier3_events; document naming convention; insert blobs via Edge Function that also writes ops.tier3_index; open PR.
  - if_tier4: Add a new namespace under tier4_derived with source_kind value; write rebuild script in scripts/sync/ that inserts into ops.knowledge_embeddings; open PR.
  - update_etl: If cross-tier, add to etl_flows.
  - update_secrets_map: If new credentials needed.

# ---------------------------------------------------------------------------
# Design notes index — resolves "Bài #N" references in migration comments
# ---------------------------------------------------------------------------
# Migrations under supabase/migrations/ reference design notes by number
# (e.g. "Bài #5", "Bài #11"). Notes live in two folders depending on phase.
design_notes_index:
  phase_a1_root_problems:
    location: notes/ (top-level) and brainstorm threads
    range: "Bài #1 – Bài #7"
    notes:
      "Bài #1": 4-Tier Truth Model + audit log
      "Bài #2": HITL tiers (also in governance/HITL.md)
      "Bài #5": Multi-Agent Orchestration (tasks, agent_runs, minion_jobs)
      "Bài #7": Economic Architecture (also knowledge/economic-architecture.md)
  phase_a2_extensions:
    location: knowledge/phase-a2-extensions/
    range: "Bài #8 – Bài #20"
    notes:
      "Bài #8":  bai-8-scheduling-architecture-DRAFT.md     # scheduled_runs
      "Bài #9":  bai-9-sop-architecture-DRAFT.md            # sop_runs
      "Bài #10": bai-10-real-time-visibility-DRAFT.md       # kpi_snapshots, alerts
      "Bài #11": bai-11-event-driven-triggers-DRAFT.md      # events outbox
      "Bài #12": bai-12-mcp-integration-DRAFT.md            # mcp_calls
