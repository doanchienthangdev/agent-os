# ============================================================================
# capability-registry.yaml — Capability Registry — boilerplate
# ============================================================================
# Tier 1 declarative file. Tracks all capabilities deployed on this Agent OS —
# proposed, in-progress, deployed, deprecated.
#
# Each capability = unit of business value packaged as:
#   - 1+ skills, 0-N SOPs, 0-N Tier 1 changes, 0-N migrations,
#     0-N integrations, 0-N frontend pages, 0-N external services
#
# When you run `/cla propose`, the workflow appends here on Phase 8 promotion.
# ============================================================================

version: "1.0.0"
schema: knowledge/schemas/capability-registry.schema.json

# === Lifecycle states (matches ops.capability_runs.state) ===
# proposed: founder proposed, Phase 1-3 in progress
# analyzing: Phase 2-3 (domain + system)
# architecting: Phase 4-5 (options + spec)
# planning: Phase 6 (sprint plan)
# implementing: Phase 7 (active development)
# deployed: Phase 8 done, in production
# operating: stable, ongoing operation
# deprecated: scheduled for removal
# superseded: replaced by newer capability

# === HITL tier thresholds ===
hitl_thresholds:
  proposed_to_analyzing: tier_a
  analyzing_to_architecting: tier_a
  architecting_to_planning: tier_b
  planning_to_implementing: tier_c
  implementing_to_deployed: tier_b
  deployed_to_deprecated: tier_c

# === Capabilities catalog ===
# When CLA workflow runs, it appends capabilities here.
#
# === Boilerplate state ===
# Empty by design. The first capability you ship via /cla will land here.
# See `notes/CLA-USAGE.md` for the workflow.

capabilities: []

# === Example entry (for reference; uncomment + adapt when needed) ===
#
# - id: example-capability
#   version: "1.0.0"
#   state: proposed
#   state_since: "2026-05-15"   # MUST be string (quoted) — yaml auto-converts unquoted dates
#   proposed_at: "2026-05-15"
#   pillar_owner: 06-ai-ops      # owning pillar slug
#   business_owner: founder      # role slug from governance/ROLES.md
#   tech_owner: gps              # role slug
#   description: |
#     One-paragraph summary of what this capability does for the org.
#   skills:
#     - "06-ai-ops/skills/<your-skill>"
#   sops: []
#   migrations: []
#   integrations: []
#   notes: |
#     Any context for future operators.
