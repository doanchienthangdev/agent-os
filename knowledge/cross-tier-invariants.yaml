# ============================================================================
# Cross-Tier Invariants — ${ORG_NAME} Works Consistency Engine
# ============================================================================
# Declarative manifest of relationships between Tier 1 git artifacts, Tier 2
# Supabase ops state, and (later) Tier 3/4 derived artifacts. Consumed by:
#   - L1 pre-commit: structural invariants (file existence, basic refs)
#   - L2 CI validators: cross-tier checks (manifest ↔ DB, skills ↔ tables, ...)
#   - L3 AI nightly sweep (v1.0b+): semantic invariants with ai_check_prompt
#
# Schema: knowledge/schemas/cross-tier-invariants.schema.json
# Background: .archives/ceo-plans/2026-05-14-cross-tier-consistency-engine.md
# ============================================================================

version: "1.0.0"

invariants:
  # --------------------------------------------------------------------------
  # Schema snapshot freshness (L3 deferred — needs Docker/pg_dump)
  # --------------------------------------------------------------------------
  # In v1.0a we skip the snapshot file; L2 validators read directly from
  # supabase/migrations/*.sql (concatenated). When a snapshot file is added
  # in v1.0b (via Docker or direct pg_dump), this invariant turns on.
  - id: snapshot-header-matches-newest-migration
    description: "supabase/schema-snapshot.sql header must reference the newest migration file"
    kind: header_match
    layer: L3
    status: deferred
    source:
      tier: 1
      ref: supabase/schema-snapshot.sql
      query: "header:last_migration"
    target:
      tier: 1
      ref: supabase/migrations/
      query: "ls | sort -V | tail -1"
    severity: critical
    hitl_tier: B
    fix_strategy: regen_bundle
    notes: |
      Deferred — no snapshot file in v1.0a/b/c. Activates when v1.0d adds
      `supabase db dump` pipeline (requires Docker or direct pg_dump).

  # --------------------------------------------------------------------------
  # Manifest ↔ migrations (L2 — derived from concatenated migrations)
  # --------------------------------------------------------------------------
  - id: manifest-tier2-tables-subset
    description: "Every table listed in manifest.tier2_operational.schemas.ops MUST be CREATE TABLE'd by some migration"
    kind: subset
    layer: L2
    source:
      tier: 1
      ref: knowledge/manifest.yaml
      query: "$.tier2_operational.schemas.ops.tables[*].name"
    target:
      tier: 1
      ref: supabase/migrations/
      query: "regex:CREATE TABLE (?:IF NOT EXISTS )?ops\\.([a-z_]+)"
    severity: critical
    hitl_tier: C
    fix_strategy: patch_yaml

  - id: manifest-tier2-metrics-tables-subset
    description: "Every table listed in manifest.tier2_operational.schemas.metrics MUST be CREATE TABLE'd by some migration"
    kind: subset
    layer: L2
    source:
      tier: 1
      ref: knowledge/manifest.yaml
      query: "$.tier2_operational.schemas.metrics.tables[*].name"
    target:
      tier: 1
      ref: supabase/migrations/
      query: "regex:CREATE TABLE (?:IF NOT EXISTS )?metrics\\.([a-z_]+)"
    severity: critical
    hitl_tier: C
    fix_strategy: patch_yaml

  # --------------------------------------------------------------------------
  # Manifest migration_file paths must exist (L1, deterministic)
  # --------------------------------------------------------------------------
  - id: manifest-migration-file-refs-exist
    description: "Every migration_file: path in manifest.yaml must point to an existing file"
    kind: exists
    layer: L1
    source:
      tier: 1
      ref: knowledge/manifest.yaml
      query: "$..migration_file"
    target:
      tier: 1
      ref: "."
      query: "file:exists"
    severity: critical
    hitl_tier: B
    fix_strategy: patch_yaml

  - id: manifest-extended-by-paths-exist
    description: "Every extended_by: path in manifest.yaml must point to an existing migration file"
    kind: exists
    layer: L1
    source:
      tier: 1
      ref: knowledge/manifest.yaml
      query: "$..extended_by"
    target:
      tier: 1
      ref: "."
      query: "file:exists"
    severity: critical
    hitl_tier: B
    fix_strategy: patch_yaml

  # --------------------------------------------------------------------------
  # Schedules ↔ skill registry (L2)
  # --------------------------------------------------------------------------
  - id: schedules-skills-registered
    description: "Every `skill:` referenced in schedules.yaml must be in minion-worker SKILL_REGISTRY"
    kind: subset
    layer: L2
    source:
      tier: 1
      ref: knowledge/schedules.yaml
      query: "$.schedules[*].skill"
    target:
      tier: 1
      ref: supabase/functions/minion-worker/index.ts
      query: "regex:\"([a-z-]+)\":\\s*make[A-Z]"
    severity: critical
    hitl_tier: B
    fix_strategy: open_pr

  # --------------------------------------------------------------------------
  # Skills/Edge Functions ↔ DB tables (L2)
  # --------------------------------------------------------------------------
  - id: code-table-references-exist
    description: "Every `.from('<table>')` in supabase/functions/ must reference a table CREATE'd by some migration"
    kind: subset
    layer: L2
    source:
      tier: 1
      ref: "supabase/functions/"
      query: "regex:\\.from\\(['\"]([a-z_]+)['\"]\\)"
    target:
      tier: 1
      ref: supabase/migrations/
      query: "regex:CREATE TABLE (?:IF NOT EXISTS )?(?:ops|metrics|public)\\.([a-z_]+)"
    severity: critical
    hitl_tier: B
    fix_strategy: open_pr

  # --------------------------------------------------------------------------
  # Governance ROLES ↔ skills (L2)
  # --------------------------------------------------------------------------
  - id: roles-skills-exist
    description: "Every skill mentioned in governance/ROLES.md must exist under 06-ai-ops/skills/"
    kind: subset
    layer: L2
    source:
      tier: 1
      ref: governance/ROLES.md
      query: "regex:^\\s*-\\s+([a-z][a-z0-9-]+)\\s*$"
    target:
      tier: 1
      ref: 06-ai-ops/skills/
      query: "ls"
    severity: warn
    hitl_tier: B
    fix_strategy: manual_only
    notes: |
      ROLES.md is prose-heavy; the regex query is best-effort. False positives
      acceptable in v1.0a; refine in v1.1 with marker comments.

  # --------------------------------------------------------------------------
  # HITL.md tier classifications ↔ enforcement hooks (L2)
  # --------------------------------------------------------------------------
  - id: hitl-tier-d-actions-have-hook-or-exemption
    description: "Every Tier D action in governance/HITL.md must have an enforcement hook in .claude/hooks/ OR be marked not_enforced"
    kind: implies
    layer: L2
    source:
      tier: 1
      ref: governance/HITL.md
      query: "section:Tier D"
    target:
      tier: 1
      ref: .claude/hooks/
      query: "ls"
    severity: warn
    hitl_tier: C
    fix_strategy: manual_only
    notes: |
      v1.0a uses heuristic mapping. v1.1 will introduce explicit
      hitl_action_id ↔ hook_file marker comments for exact coverage.

  # --------------------------------------------------------------------------
  # Schedules bundle freshness (L1)
  # --------------------------------------------------------------------------
  - id: schedules-bundle-matches-yaml
    description: "schedules.generated.ts must match the current schedules.yaml (regenerate via wave2-bundle-schedules.cjs)"
    kind: equal
    layer: L1
    source:
      tier: 1
      ref: knowledge/schedules.yaml
      query: "$.schedules[*].id"
    target:
      tier: 1
      ref: supabase/functions/_shared/schedules.generated.ts
      query: "regex:^\\s*\"([a-z][a-z0-9-]+)\":\\s*\\{"
    severity: critical
    hitl_tier: A
    fix_strategy: regen_bundle

  # --------------------------------------------------------------------------
  # Event subscriptions ↔ event types emitted (L2)
  # --------------------------------------------------------------------------
  - id: event-subscriptions-types-exist
    description: "Every event_type in event-subscriptions.yaml must appear in at least one emitter (migration COMMENT, skill, hook) OR be marked as external"
    kind: implies
    layer: L2
    source:
      tier: 1
      ref: knowledge/event-subscriptions.yaml
      query: "$..event_type"
    target:
      tier: 1
      ref: "supabase/migrations/, supabase/functions/, 06-ai-ops/skills/"
      query: "regex:event_type[\"':\\s]+([a-z][a-z0-9._-]+)"
    severity: warn
    hitl_tier: B
    fix_strategy: manual_only

  # --------------------------------------------------------------------------
  # Schema snapshot existence (L3 deferred — see snapshot-header invariant)
  # --------------------------------------------------------------------------
  - id: schema-snapshot-exists
    description: "supabase/schema-snapshot.sql must exist"
    kind: exists
    layer: L3
    status: deferred
    source:
      tier: 1
      ref: supabase/schema-snapshot.sql
      query: "file:exists"
    target:
      tier: 1
      ref: "."
      query: "file:exists"
    severity: critical
    hitl_tier: A
    fix_strategy: regen_bundle
    notes: |
      Deferred — needs Docker or direct pg_dump. Activates with v1.0d.

  # --------------------------------------------------------------------------
  # Live-DB invariants (L3, runnable in v1.0c via ops.get_ops_* RPC helpers)
  # --------------------------------------------------------------------------
  - id: live-db-tables-match-manifest
    description: "Every ops.* table in live DB must appear in manifest.tier2_operational.schemas.ops.tables"
    kind: subset
    layer: L3
    status: live
    source:
      tier: 2
      ref: "ops.*"
      query: "rpc:ops.get_ops_tables"
    target:
      tier: 1
      ref: knowledge/manifest.yaml
      query: "$.tier2_operational.schemas.ops.tables[*].name"
    severity: critical
    hitl_tier: C
    fix_strategy: patch_yaml
    notes: |
      Mirror of L2 manifest-tier2-tables-subset but uses LIVE DB (not migrations
      on disk). Catches drift introduced via Supabase UI direct edits.

  - id: live-db-tables-have-rls
    description: "Every ops.* table in live DB should have RLS enabled"
    kind: implies
    layer: L3
    status: live
    source:
      tier: 2
      ref: "ops.*"
      query: "rpc:ops.get_ops_rls_state"
    target:
      tier: 2
      ref: "ops.*"
      query: "rpc:ops.get_ops_rls_state[rls_enabled=true]"
    severity: warn
    hitl_tier: B
    fix_strategy: add_migration
    notes: |
      Catches the failure pattern seen with capability_runs and
      capability_phase_events — added in migration 00011, RLS forgotten until
      00020 caught it manually. With this invariant active, any future RLS
      gap would be reported within 24h.
