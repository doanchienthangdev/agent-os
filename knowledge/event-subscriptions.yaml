# event-subscriptions.yaml — Event subscriptions (Bài #11)
# See playbook chương 18 + DRAFT bai-11
version: "1.0.0"

subscriptions:
  # Pattern: source.entity.action -> SOP/skill
  # Example:
  # - event: ${ORG_EVENT_NS}.customer.activated
  #   trigger: SOP-CUSTOMER-002-welcome-sequence
  #   tier: tier_a
  
  # {{ADD_PROJECT_SUBSCRIPTIONS}}

  # Cross-Tier Consistency Engine events (v1.0b+).
  # Emitted by consistency-sweep + (v1.0c) consistency-check workers when drift
  # is detected. Each subscription routes the event to a SOP/skill for triage.
  - event: consistency.drift_detected
    trigger: SOP-AIOPS-002-cross-tier-consistency
    tier: tier_b
  - event: consistency.fix_proposed
    trigger: SOP-AIOPS-002-cross-tier-consistency
    tier: tier_b
  - event: consistency.fix_merged
    trigger: SOP-AIOPS-002-cross-tier-consistency
    tier: tier_a
  - event: consistency.fix_reverted
    trigger: SOP-AIOPS-002-cross-tier-consistency
    tier: tier_c
  - event: consistency.drift_batch_pending
    trigger: SOP-AIOPS-002-cross-tier-consistency
    tier: tier_b
